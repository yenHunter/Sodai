name: Laravel CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        
    - name: Install Dependencies
      run: composer install
      
    - name: Run Tests
      run: php artisan test
      
    - name: Laravel Pint
      run: ./vendor/bin/pint --test